<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Page transitions ── */
        @keyframes pg-in  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        @keyframes pg-out { from { opacity:1; transform:translateY(0); }   to { opacity:0; transform:translateY(-8px); } }
        body { animation: pg-in .35s ease both; }
        body.page-out { animation: pg-out .24s ease both !important; pointer-events: none !important; }

        body {
            min-height: 100vh;
            background: #080b11;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Decorative blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .18;
            pointer-events: none;
        }
        body::before {
            width: 520px; height: 520px;
            background: radial-gradient(circle, #00d4ff, transparent 70%);
            top: -160px; left: -160px;
        }
        body::after {
            width: 420px; height: 420px;
            background: radial-gradient(circle, #ff2d78, transparent 70%);
            bottom: -140px; right: -120px;
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            background: #111827;
            border: 1px solid #1e2d45;
            border-radius: 20px;
            padding: 40px 36px 36px;
            box-shadow: 0 24px 60px rgba(0,0,0,.5);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-logo-icon {
            width: 54px; height: 54px;
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            margin-bottom: 12px;
            box-shadow: 0 0 24px rgba(0,212,255,.25);
        }

        .login-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .login-subtitle {
            font-size: 0.82rem;
            color: #4d6480;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 0.83rem;
            font-weight: 600;
            color: #7a8fa8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #3d5068;
            font-size: 14px;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            background: #0d1520;
            border: 1.5px solid #1e2d45;
            border-radius: 12px;
            padding: 13px 14px 13px 40px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: #e8edf5;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-control::placeholder { color: #2d4057; }

        .form-control:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 4px rgba(0,212,255,.12);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            margin-top: 6px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            color: #fff;
            font-size: 0.97rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
            letter-spacing: .03em;
        }

        .btn-login:hover  { opacity: .88; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }

        .btn-cancel {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1.5px solid #1e2d45;
            border-radius: 12px;
            background: transparent;
            color: #4d6480;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background .2s, color .2s, border-color .2s;
        }

        .btn-cancel:hover {
            background: #1a2d44;
            color: #7a8fa8;
            border-color: #2a3f58;
        }

        #mensaje {
            min-height: 22px;
            margin-top: 14px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ff6b6b;
            padding: 0 4px;
        }

        #mensaje.success {
            color: #39d353;
        }

        .login-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #2d4057;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-logo">
        <div class="login-logo-icon"><i class="fas fa-music"></i></div>
        <div class="login-title">4You — Music</div>
        <div class="login-subtitle">Ingresa para continuar</div>
    </div>

    <div class="form-group">
        <label class="form-label">Usuario</label>
        <div class="input-wrap">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="usuario" class="form-control" placeholder="Ingrese su usuario" autocomplete="username">
        </div>
    </div>

    <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" class="form-control" placeholder="Ingrese su contraseña" autocomplete="current-password"
                   onkeydown="if(event.key==='Enter') validarLogin()">
        </div>
    </div>

    <button class="btn-login" onclick="validarLogin()">
        <i class="fas fa-arrow-right-to-bracket"></i> Ingresar
    </button>
    <button class="btn-cancel" onclick="limpiar()">Cancelar</button>

    <div id="mensaje"></div>

    <p class="login-hint">Credenciales de prueba: admin / admin</p>
</div>

<script>
    function validarLogin() {
        const usuario  = document.getElementById("usuario").value;
        const password = document.getElementById("password").value;
        const mensaje  = document.getElementById("mensaje");

        if (usuario === "admin" && password === "admin") {
            mensaje.className = "success";
            mensaje.textContent = "Acceso correcto, redirigiendo…";
            document.body.classList.add('page-out');
            setTimeout(function(){ window.location.href = "hub.html"; }, 260);
        } else {
            mensaje.className = "";
            mensaje.textContent = "Usuario o contraseña incorrectos";
            /* shake animation */
            const card = document.querySelector('.login-card');
            card.style.animation = 'shake .35s ease';
            setTimeout(()=> card.style.animation = '', 400);
        }
    }

    function limpiar() {
        document.getElementById("usuario").value  = "";
        document.getElementById("password").value = "";
        document.getElementById("mensaje").textContent = "";
        document.getElementById("mensaje").className = "";
    }
</script>

<style>
@keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
}

/* ════════════════════════════════════════════════════
   RESPONSIVE — TABLET  (max-width: 1024px)
   La tarjeta de login ya tiene max-width:400px y
   está centrada, así que solo ajustamos padding.
════════════════════════════════════════════════════ */
@media (max-width: 1024px) {

  .login-card {
    padding: 32px 28px 28px !important;
  }
}

/* ════════════════════════════════════════════════════
   RESPONSIVE — MÓVIL  (max-width: 640px)
   La tarjeta ocupa casi todo el ancho de pantalla.
   Los blobs decorativos se escalan para no desbordar.
════════════════════════════════════════════════════ */
@media (max-width: 640px) {

  /* ── Cuerpo: permitir scroll si la pantalla es muy baja ── */
  body {
    align-items: flex-start !important;
    padding: 24px 14px !important;
    overflow: auto !important;
  }

  /* ── Blobs decorativos más pequeños ── */
  body::before {
    width: 280px !important;
    height: 280px !important;
    top: -100px !important;
    left: -100px !important;
  }
  body::after {
    width: 220px !important;
    height: 220px !important;
    bottom: -80px !important;
    right: -80px !important;
  }

  /* ── Tarjeta: ancho completo, padding reducido ── */
  .login-card {
    max-width: 100% !important;
    padding: 28px 18px 22px !important;
    border-radius: 16px !important;
  }

  /* ── Logo un poco más pequeño ── */
  .login-logo-icon {
    width: 46px !important;
    height: 46px !important;
    font-size: 18px !important;
  }

  .login-title {
    font-size: 1.15rem !important;
  }

  /* ── Inputs cómodos para el teclado táctil ── */
  .form-control {
    padding: 14px 14px 14px 40px !important;
    font-size: 1rem !important;
  }

  /* ── Botones más altos para toque fácil ── */
  .btn-login {
    padding: 16px !important;
    font-size: 1rem !important;
  }
  .btn-cancel {
    padding: 14px !important;
  }
}
</style>

</body>
</html>
